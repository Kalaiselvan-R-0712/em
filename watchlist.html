<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Services | Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}

body{
background:linear-gradient(135deg,#fff0f6,#ffd6ea,#fff5fa);
color:#222;
overflow-x:hidden;
min-height:100vh;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:#fff;
box-shadow:0 4px 15px rgba(0,0,0,.06);
z-index:3000;
}

.header-left{display:flex;align-items:center;}
.logo img{height:32px;}

.profile{
display:flex;
gap:18px;
align-items:center;
}

.profile i:hover{
color:#ff2e8b;
transform:scale(1.1);
}

#profileName{
font-weight:600;
font-size:14px;
color:#222;
}

#profileEmail{
font-size:11px;
color:#666;
}
.profile i{color:#222;}

#profileEmail{color:#666;}

/* SIDEBAR (COPIED PERFECTLY) */
.sidebar{
width:250px;
background:#fff;
border-right:1px solid #eee;
position:fixed;
top:70px;
height:calc(100% - 70px);
padding:20px;
display:flex;
flex-direction:column;
z-index:2500;
transition:0.3s;
}

.sidebar a{
display:flex;
gap:12px;
padding:12px;
border-radius:10px;
color:#555;
text-decoration:none;
margin-bottom:5px;
align-items:center;
transition:0.2s;
}

.sidebar a:hover{
background:#fff0f6;
color:#ff2e8b;
}

.sidebar a.active{
background:#ff2e8b;
color:#fff;
}

.logout{
color:#ff2e8b;
border:1px solid rgba(255,77,77,0.2);
background:rgba(255,77,77,0.05);
margin-top:10px;
padding:12px;
border-radius:10px;
display:flex;
gap:12px;
cursor:pointer;
}

/* MAIN */
.main{
margin-left:250px;
padding:100px 30px;
}

/* SERVICES GRID */
.services{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.service{
background:#fff;
border:1px solid #eee;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.service:hover{
transform:translateY(-6px);
border-color:#ff2e8b;
box-shadow:0 20px 50px rgba(255,46,139,0.2);
}

.service img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.service p{
font-weight:600;
color:#333;
}

/* PANEL */
.panel{
background:#fff;
padding:25px;
border-radius:15px;
margin-top:30px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.panel h3{margin-bottom:10px;}

.panel p{color:#666;}

.btn{
background:#ff2e8b;
border:none;
padding:12px 20px;
border-radius:8px;
color:#fff;
margin-top:10px;
cursor:pointer;
font-weight:600;
box-shadow:0 8px 20px rgba(255,46,139,0.25);
}
.btn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 18px 45px rgba(255,46,139,0.5);
}

/* HAMBURGER */
.hamburger{
display:none;
font-size:24px;
cursor:pointer;
color:#ff2e8b;
margin-right:15px;
}

/* MOBILE FIX (EXACT COPY FROM DASHBOARD) */
@media(max-width:768px){

.hamburger{display:flex;}

.sidebar{
transform:translateX(-100%);
background:#fff;
top:70px;
height:calc(100% - 70px);
width:280px;
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
padding:90px 20px;
}

body{
overflow-x:hidden;
}

.overlay{
top:70px;
height:calc(100% - 70px);
position:fixed;
left:0;
width:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:2500;
}

.overlay.active{
opacity:1;
visibility:visible;
}

}
</style>
</head>

<body>

<header>
<div class="header-left">
<div class="hamburger" onclick="toggleSidebar()">
<i class="fa-solid fa-bars"></i>
</div>
<div class="logo">
<img src="assets/images/logo/stackly_logo.webp">
</div>
</div>

<div class="profile">
<i class="fa-regular fa-bell" onclick="go404()" style="cursor:pointer; font-size:18px;"></i>

<i class="fa-regular fa-circle-user" 
onclick="go404()" 
style="cursor:pointer; font-size:22px;"></i>
<div>
<div id="profileName">User</div>
<div id="profileEmail">user@mail.com</div>
</div>
</div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">

<a href="user_dashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a>
<a href="watchlist.html" class="active"><i class="fa-solid fa-heart"></i>My Services</a>
<a href="my_ratings.html"><i class="fa-solid fa-star"></i>My Ratings</a>
<a href="us_settings.html"><i class="fa-solid fa-gear"></i>Settings</a>

<div class="logout" onclick="logoutUser()">
<i class="fa-solid fa-right-from-bracket"></i>Logout
</div>

</aside>

<main class="main">

<h1 style="margin-bottom:25px;font-weight:800;">My Events 🎉</h1>

<div class="services">

<div class="service" onclick="go404()">
<img src="assets/images/d1.webp">
<p>Wedding Event</p>
</div>

<div class="service" onclick="go404()">
<img src="assets/images/d3.webp">
<p>Corporate Event</p>
</div>

<div class="service" onclick="go404()">
<img src="assets/images/d2.webp">
<p>Birthday Party</p>
</div>

<div class="service" onclick="go404()">
<img src="assets/images/d4.webp">
<p>Private Celebration</p>
</div>

</div>

<div class="panel">
<h3>Manage Your Events</h3>
<p>View, update, or manage your booked events</p>
<button class="btn" onclick="go404()">Manage Events</button>
</div>

</main>

<script>
function toggleSidebar(){
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(sidebar.classList.contains("active")){
sidebar.classList.remove("active");
overlay.classList.remove("active");
}else{
sidebar.classList.add("active");
overlay.classList.add("active");
}
}

function go404(){ window.location.href="us_404.html"; }

function logoutUser(){
localStorage.clear();
window.location.href="login.html";
}

const storedData = localStorage.getItem("userData");
if(storedData){
const user = JSON.parse(storedData);
document.getElementById("profileName").textContent = user.role || "User";
document.getElementById("profileEmail").textContent = user.email;
}
</script>

</body>
</html>
